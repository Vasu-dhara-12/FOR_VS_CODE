<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #38bdf8;
        }

        p {
            font-size: 18px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #38bdf8;
            color: black;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to My Docker App</h1>
        <p>CI/CD Pipeline Working Successfully 🚀</p>
        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello from Docker Container!");
        }
    </script>

</body>
</html>
